l_english:

    asari_rep_civic_thes_dip_corp:0 "Thessian Diplomatic Corps"
    asari_rep_civic_thes_dip_corp_desc:0 "Republics are galaxy-wide renowned for their excellent diplomats, securing whatever they need through talks, political pressure and mutually beneficial trade deals, rather than violence."
    asari_rep_civic_democracy:0 "Asari Democracy"
    asari_rep_civic_democracy_desc:0 "Every republic is a form of E-Democracy, allowing every citizen to discuss and vote on state issues, using sophisticated communications and omnipresent media on and beyond Thessia. While it allows for instantaneous dissemination of ideas and diverse viewpoints, it does not allow the Republics to act quickly and decisively, especially when facing a crisis."
    asari_rep_civic_universities:0 "Open Door universities"
    asari_rep_civic_universities_desc:0 "While our universities were open to everyone, Alien or Asari alike for centuries now, we should increase the available openings, and further encourage Aliens to study at our halls, allowing our ideas, culture and viewpoint to spread even further while benefiting our research."
    turian_hier_honor:0 "Turian Honor"
    turian_hier_honor_desc:0 "War until victory. War however long and hard the road may be. War until our foes can never threaten us again. We must demonstrate that no matter what the enemy, it picked the wrong foe."
    turian_hier_service:0 "Universal Service"
    turian_hier_service_desc:0 "All Turians earn citizenship through service, and all service benefits the Hierarchy. Whether a clerk, scout general, or maintenance technician, military service in the Hierarchy is ubiquitous. According to our station, all without exception."
    turian_hier_elkoss:0 "Elkoss Combine Fleet Contract"
    turian_hier_elkoss_desc:0 "Extensive negotiations with the Vol Protectorate and Elkoss combine have concluded. Elkoss Combine, in exchange for exclusive contracts to build and maintain the ships of the Turian Navy, will make use of their proprietary shipbuilding materials and techniques, along with some of the galaxy’s finest shipbuilding consultants. Turian soldiers will win battles, Volus shipyards will win wars."
    salarian_uni_hold_the_line:0 "Hold the Line"
    salarian_uni_hold_the_line_desc:0 "The Silent Step and The Ever Alert used knowledge as their ultimate weapon, knowing when to strike and when to withhold. Their example shall lead us into the coming battles, where we shall continue to hold the line!"
    salarian_uni_qual_tech_results:0 "Quality Tech, Quality Results"
    salarian_uni_qual_tech_results_desc:0 "One-million conscripts will never do as much damage as one highly skilled operative. The same rules apply to our technology - there is no price tag or development time high enough to justify deploying our forces with unoptimized equipment."
    salarian_uni_strat_enlight:0 "Strategic Enlightenment"
    salarian_uni_strat_enlight_desc:0 "The Krogan Rebellions were a harsh lesson on the dangers of uplifting pre-FTL races, yet the Krogan also exemplify the strategic value of primitive enlightenment. With a greater understanding of primitive nature and deeper study into the universal patterns of evolution, perhaps we can direct uplifted races with far more precision."
