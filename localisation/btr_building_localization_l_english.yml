l_english:

building_galactic_commercial_zone:0 "Galactic Commerical Zone"
building_galactic_commercial_zone_desc:0 "An area dedicated to commerce in its most raw and base form. Special loopholes, exemptions, and provisions allow corporations from across the galaxy to set up offices, shops, and headquarters here. This gives the local population access to possibly the most varied selection of goods in the galaxy while also providing jobs and export opportunities as businesses learn more about what the host planet has to offer."
building_economic_regulation_office:0 "Economic Regulation Office"
building_economic_regulation_office_desc:0 "A government run office that helps standardize industry practices and helps advance new procedures and technologies within industries. Its mandate is to ensure that all industries operate as efficiently as possible and prevent petty tyrants or personal feuds from interfering in the economy. It also keeps an eye on the companies it works with to ensure they are not taking actions that may destabilize the economy in the future."
building_geth_uplink_node:0 "Geth Uplink Node"
building_geth_uplink_node_desc:0 "While the Geth are capable of near light speed communication when inside their mobile platform this is limited to only those nearby. The uplink nodes render them immobile by retrieving the programs from the mobile platform but allows communication across nearly the entirety of Geth space."
building_enhanced_production_center:0 "Enhanced Production Center"
building_enhanced_production_center_desc:0 "Originally the Geth were a labor force, freeing the Quarians of the more tedious and menial tasks. This required them to be built in large numbers with many factories being set up to mass produce Geth units. Over the centuries the Geth have maintained and enhanced these factories to produce new and more powerful Geth units.
building_nazara_uplink_node:0 "Geth Uplink Node"
building_nazara_uplink_node_desc:0 "While the Geth are capable of near light speed communication when inside their mobile platform this is limited to only those nearby. The uplink nodes render them immobile by retrieving the programs from the mobile platform but allows communication across nearly the entirety of Geth space."
building_nazaras_claw:0 "Nazara's Claw"
building_nazaras_claw_desc:0 "A testament of Nazara’s strength and advanced status, these replicas cannot come close to matching the original perfection. Yet even in their flawed state they are enough to remind us of our destiny and allow us to show our reverence for the one that will lead us there."
building_enkindler_reliquary:0 "Enkindler Reliquary"
building_enkindler_reliquary_desc:0 "The Enkindlers have left us a plethora of gifts and treasures along with many mysteries for us to solve and learn from. These artifacts must be cared for and maintained as well as displayed for the benefit of all the faithful. This is easiest done in a centralized location with dedicated staff and resources."
building_drell_barracks:0 "Drell Barracks"
building_drell_barracks_desc:0 "Very few of our own population are suited to warfare or combat but luckily our Drell friends are ready and willing to take up that responsibility. While we do everything in our power to support them with cutting edge equipment and the most thorough training available it is ultimately up to them to maintain our security."
building_elkoss_office:0 "Elkoss Combine Office"
building_elkoss_office_desc:0 "The local office of the massive equipment corporation Elkoss Combine."
building_kon_franchise:0 "Kon Junction Franchise"
building_kon_franchise_desc:0 "A popular clothing brand that services most species but ironically does not carry Volus apparel despite being owned and operated by Volus."
building_delmucore_systems:0 "Delmucore Systems"
building_delmucore_systems_desc:0 "A Turian electronics manufacturer that specializes in robust and reliable designs, known for scandals with its CEO."
building_vol_banking:0 "Vol-Clan Galactic Banking & Exchange"
building_vol_banking_desc:0 "A bank intended to serve Volus living abroad or with significant interests outside of Vol space. It has rapidly developed into one of the major banks of council space with members from all species and interests in nearly every industry."
building_hcc:0 "HCC News Partner"
building_hcc_desc:0 "A Turian galactic news outlet which is known for providing detailed reporting on events occurring within, or involving, the Hierarchy. It is not considered to be biased or controlled by the Palaven government"
building_sirenum:0 "Sirenum Scopuli"
building_sirenum_desc:0 "A Turian news outlet that specializes in investigative reporting, known for daring stunts and bold undercover operations their reports are few and far between but almost always get the attention of high ranking officials."
building_narhu:0 "Narhu Combine"
building_narhu_desc:0 "A Volus mining firm known for its ability to extract Helium-3 from gas giants but it offers a wide range of mining and ground-moving operations to potential clients."
building_armex:0 "Armex Arsenal"
building_armex_desc:0 "A famed Turian weapons manufacturer it is renowned for the quality of its weapons as well as their lethality. It provides a large amount of the Hierarchies small arms as well as equipping a portion of other nations militaries and some mercenary groups."
building_halit:0 "Haliat Armory"
building_halit_desc:0 "The civilian corporation arm of one of the Turian militaries R&D centers, it has recently been given clearance to offload extra equipment onto the galactic market. It specializes in extremely reliable and effective small arms."
building_rodam:0 "Rodam Expeditions"
building_rodam_desc:0 "A newly risen Turian run weapons shop that buys and sells small arms to civilians and professionals alike. While it has no military contracts its stock can have unique items that can’t be found with brand name retailers."
building_ez:0 "EZ Meat INC"
building_ez_desc:0 "A fast food company that is known for serving cuisine from all of Citadel space in a quick and timely manner. Some question how close to the original dishes their items are but its profitability hints that not many care."
building_jenan:0 "JenanTech"
building_jenan_desc:0 "A new player in the utilities sector it has begun expanding rapidly through citadel space."
building_cision:0 "Cision Motors"
building_cision_desc:0 "A firm specializing in small scale private and commercial terrestrial motors."
building_advising:0 "Volus Business Advising"
building_advising_desc:0 "We can leverage our reputation as expert businessmen to gain profit by having local firms hire a Volus advisor to oversee their company or develop strategies and systems for local businesses."